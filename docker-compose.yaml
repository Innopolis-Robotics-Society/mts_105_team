x-common: &common-setup
  build:
    context: .
    dockerfile: Dockerfile
  network_mode: host
  privileged: true
  volumes:
    - ${HOME}/.Xauthority:/home/mobile/.Xauthority:rw
    - .:/home/mobile/ros2_ws/src:rw
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - /dev/dri:/dev/dri:rw
  environment:
    - DISPLAY
    - QT_X11_NO_MITSHM=1
    - TELEMETRY_PROTO=udp   # <-- was PROTO=tcp (unused). Use the var your node reads.
    - TEL_HOST=0.0.0.0      # <-- bind wildcard, receives from host
    - TEL_PORT=5600

services:
  terminal:
    <<: *common-setup
    stdin_open: true
    tty: true
    working_dir: /home/mobile/ros2_ws
    command: bash -c "
        set -e
        echo 'Starting' &&
        colcon build &&
        source install/setup.bash &&
        ros2 launch a105_bringup 3d_simca.launch.py
      "

